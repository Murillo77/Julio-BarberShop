<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Julio BarberShop</title>
</head>
<body>
    <!-- NAV -->
    <header>
        <div class="barra-nav">
            <img class="img-logo" src="./img/logo-barber.png" alt="Logo da Barbearia">

            <!-- Ícone do menu (mobile) -->
            <div class="menu-icon" onclick="toggleMenu()">
                <i class="fa-solid fa-bars"></i>
            </div>

            <div class="links" id="menuLinks">
                <li><a href="#home">Home</a></li>
                <li><a href="#sobre">Sobre nós</a></li>
                <li><a href="#trabalho">Serviços</a></li>
                <li><a href="#contatos">Contatos</a></li>
            </div>
        </div>
    </header>

    <!-- HERO -->
    <section id="home" class="container">
        <div class="box">
            <img src="./img/logo-barber.png" alt="Logo da Barbearia" class="logo-hero">
            <h1 class="titulo">
                Excelência em cada fio,<br> 
                sofisticação em cada <br> 
                detalhe.
            </h1>
            <button>
                <a href="#">Agendar</a>
            </button>
        </div>
        <div class="box">
            <img class="salao" src="./img/img-salao.png" alt="Imagem do Salão">
        </div>
    </section>

   
    <script>
        function toggleMenu() {
            document.getElementById("menuLinks").classList.toggle("active");
        }
    </script>
</body>
</html>
